name: "Deploy a branch to ndla_test"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag, branch, or commit SHA)"
        required: false
        type: string
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - ndla_test
         # - ndla_staging
         # - ndla_prod
         # - prod
        default: ndla_test

jobs:
  get_variables:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      releaseRef: ${{ steps.resolve.outputs.commitSha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Resolve ref to commit SHA
        id: resolve
        run: |
          sha=$(git rev-parse HEAD)
          echo "Resolved ref '${{ inputs.ref || github.ref }}' to commit SHA: $sha"
          echo "commitSha=$sha" >> $GITHUB_OUTPUT

  build_image_hub:
    name: Hub
    needs: get_variables
    uses: ./.github/workflows/hub.yaml
    with:
      version: ${{ needs.get_variables.outputs.releaseRef }}
      deploy: false
    secrets: inherit

  build_image_content_author:
    name: Content author
    needs: get_variables
    uses: ./.github/workflows/contentauthor.yaml
    with:
      version: ${{ needs.get_variables.outputs.releaseRef }}
      deploy: false
    secrets: inherit

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs:
      - get_variables
      - build_image_hub
      - build_image_content_author
    uses: ./.github/workflows/deploy-eb.yaml
    with:
      version: ${{ needs.get_variables.outputs.releaseRef }}
      environment: ${{ inputs.environment }}
    secrets: inherit
